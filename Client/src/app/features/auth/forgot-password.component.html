<div class="min-h-screen flex items-center justify-center p-6 bg-background animate-in fade-in duration-1000">
  <div appCard class="w-full max-w-[500px] p-12 shadow-[0_40px_80px_rgba(0,0,0,0.06)] border-none">

    <div class="flex flex-col items-center mb-12 text-center">
      <div class="w-16 h-16 bg-primary/10 text-primary rounded-[1.5rem] flex items-center justify-center mb-6 shadow-sm ring-8 ring-primary/5">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight mb-2">Reset Password</h1>
      <p class="text-sm font-bold text-slate-400 uppercase tracking-widest leading-none">Security Access Recovery</p>
    </div>

    @if (!sent) {
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Email Address</label>
          <input
            appInput
            type="email"
            formControlName="email"
            placeholder="name@company.com"
          />
          @if (form.controls.email.hasError('required') && form.controls.email.touched) {
            <p class="text-rose-600 text-[10px] font-black uppercase tracking-widest mt-2">Email is required</p>
          }
        </div>

        <button
          appButton
          variant="default"
          type="submit"
          [disabled]="submitting || form.invalid"
          class="w-full h-16 text-lg shadow-primary/20 shadow-xl mt-6"
          [loading]="submitting">
          Send reset link
        </button>
      </form>
    } @else {
      <div class="text-center py-6 animate-in fade-in zoom-in duration-500">
        <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <p class="text-xl font-black text-slate-900 leading-tight">Check your inbox!</p>
        <p class="text-slate-400 font-bold text-sm mt-3 uppercase tracking-tight">Instructions have been sent.</p>

        <button (click)="sent = false" class="mt-8 text-xs font-black text-primary uppercase tracking-widest hover:underline">
          Didn't get the email? Try again
        </button>
      </div>
    }

    <div class="mt-10 pt-10 border-t border-slate-50 text-center">
      <a routerLink="/auth/login" class="inline-flex items-center text-xs font-black text-slate-400 hover:text-primary transition-all uppercase tracking-widest group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to sign in
      </a>
    </div>
  </div>
</div>
